services:
  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: clipper_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── FastAPI server ───────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      target: runtime
    container_name: clipper_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - OUTPUT_DIR=/data
    volumes:
      - ./backend:/app
      - ./data:/data
    depends_on:
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ── Celery worker ────────────────────────────────────────────────────────────
  worker:
    build:
      context: ./backend
      target: runtime
    container_name: clipper_worker
    restart: unless-stopped
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - OUTPUT_DIR=/data
    volumes:
      - ./backend:/app
      - ./data:/data
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A app.core.celery_app worker --loglevel=info -Q pipeline -c 2

  # ── Flower (Celery monitor) — optional ───────────────────────────────────────
  flower:
    build:
      context: ./backend
      target: runtime
    container_name: clipper_flower
    restart: unless-stopped
    ports:
      - "5555:5555"
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
      - worker
    command: celery -A app.core.celery_app flower --port=5555
    profiles:
      - monitoring

volumes:
  redis_data:
